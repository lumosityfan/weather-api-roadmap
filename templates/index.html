<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roadmap.sh Weather Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <h1>Roadmap.sh Weather Website</h1>
    <p>This website provides weather information for various locations.</p>
    <form method="GET" action="/weather">
        <div class="mb-3">
            <label for="latitude" class="form-label">Latitude</label>
            <input type="range" class="form-range" min="-90" max="90" step="0.1" id="latitude" name="latitude">
            <output for="latitude" id="latitudeValue" aria-hidden="true"></output>
        </div>
        <div class="mb-3">
            <label for="longitude" class="form-label">Longitude</label>
            <input type="range" class="form-range" min="-180" max="180" step="0.1" id="longitude" name="longitude">
            <output for="longitude" id="longitudeValue" aria-hidden="true"></output>
        </div>
        <button type="submit" class="btn btn-primary">Get Weather</button>
    </form>

    <script>
        const latitudeInput = document.getElementById('latitude');
        const latitudeOutput = document.getElementById('latitudeValue');
        const longitudeInput = document.getElementById('longitude');
        const longitudeOutput = document.getElementById('longitudeValue');

        // Set initial values
        latitudeOutput.textContent = latitudeInput.value;
        longitudeOutput.textContent = longitudeInput.value;

        latitudeInput.addEventListener('input', function() {
            latitudeOutput.textContent = this.value;
        });

        longitudeInput.addEventListener('input', function() {
            longitudeOutput.textContent = this.value;
        });
    </script>
</body>
</html>
